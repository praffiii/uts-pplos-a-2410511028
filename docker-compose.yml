version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - kos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: kos-auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: auth_db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kos-network

  property-service:
    build:
      context: ./services/property-service
      dockerfile: Dockerfile
    container_name: kos-property-service
    restart: unless-stopped
    environment:
      APP_PORT: 8000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: property_db
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kos-network

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: kos-booking-service
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: booking_db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PROPERTY_SERVICE_URL: http://property-service:8000
    depends_on:
      mysql:
        condition: service_healthy
      property-service:
        condition: service_started
    networks:
      - kos-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: kos-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PROPERTY_SERVICE_URL: http://property-service:8000
      BOOKING_SERVICE_URL: http://booking-service:3002
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
    depends_on:
      - auth-service
      - property-service
      - booking-service
    networks:
      - kos-network

networks:
  kos-network:
    driver: bridge

volumes:
  mysql_data:
